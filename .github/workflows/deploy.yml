name: Build and Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1. Build & Push Backend
      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/chat_backend:latest

      # 2. Build & Push Rust WebSocket
      - name: Build and push Rust WebSocket Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./rust_ws
          file: ./rust_ws/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/chat_rust_ws:latest

      # 3. Build & Push Frontend
      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/chat_frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_OWNER
          script: |
            mkdir -p ~/my_chat_project
            cd ~/my_chat_project
            
            # Download file compose mới nhất
            curl -O https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.prod.yml
            mv docker-compose.prod.yml docker-compose.yml
            
            # Đăng nhập GHCR trên server (VPS)
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u $GITHUB_OWNER --password-stdin
            
            # Cấu hình biến môi trường
            export GITHUB_REPOSITORY_OWNER=$GITHUB_OWNER
            
            # Kéo image và khởi động lại
            docker-compose pull
            docker-compose up -d --remove-orphans
